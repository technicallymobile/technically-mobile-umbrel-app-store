version: "3.7"
services:
    app_proxy:
      environment:
        APP_HOST: tm-unifi-network-application_web_1
        APP_PORT: 8080
        PROXY_AUTH_ADD: "false"
      container_name: tm-unifi-network-application_app_proxy_1

    web:
      image: nginx:alpine
      restart: unless-stopped
      command: >
        sh -c "echo 'server { listen 8080; location / { proxy_pass https://tm-unifi-network-application_app_1:8443; proxy_ssl_verify off; proxy_set_header Host
  $$host; proxy_set_header X-Real-IP $$remote_addr; proxy_set_header X-Forwarded-Proto https; proxy_http_version 1.1; proxy_set_header Upgrade $$http_upgrade;
  proxy_set_header Connection upgrade; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
      depends_on:
        - app
      container_name: tm-unifi-network-application_web_1

    app:
      image: lscr.io/linuxserver/unifi-network-application:latest
      environment:
        - PUID=1000
        - PGID=1000
        - TZ=Etc/UTC
        - MONGO_HOST=tm-unifi-network-application_unifi-db_1
        - MONGO_USER=unifi
        - MONGO_PASS=unifi_password
        - MONGO_PORT=27017
        - MONGO_DBNAME=unifi
        - MONGO_AUTHSOURCE=unifi
      volumes:
        - ${APP_DATA_DIR}/config:/config
      restart: unless-stopped
      depends_on:
        - unifi-db
      container_name: tm-unifi-network-application_app_1

    unifi-db:
      image: mongo:4.4
      volumes:
        - ${APP_DATA_DIR}/db:/data/db
      restart: unless-stopped
      entrypoint: >
        bash -c "mkdir -p /docker-entrypoint-initdb.d && printf
  'db.getSiblingDB(\"unifi\").createUser({user:\"unifi\",pwd:\"unifi_password\",roles:[{role:\"dbOwner\",db:\"unifi\"},{role:\"dbOwner\",db:\"unifi_stat\"}]});' >
  /docker-entrypoint-initdb.d/init.js && exec docker-entrypoint.sh mongod"
      container_name: tm-unifi-network-application_unifi-db_1
