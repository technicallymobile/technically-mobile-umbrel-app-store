version: "3.7"
services:
  app_proxy:
    environment:
      APP_HOST: tm-unifi-network-application_web_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  web:
    image: nginx:alpine
    restart: unless-stopped
    command: >
      sh -c "echo 'server { listen 8080; location / { proxy_pass https://tm-unifi-network-application_app_1:8443; proxy_ssl_verify off; proxy_set_header Host $$host; proxy_set_header X-Real-IP $$remote_addr; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - app

  app:
    image: lscr.io/linuxserver/unifi-network-application:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - MONGO_HOST=tm-unifi-network-application_unifi-db_1
      - MONGO_USER=unifi
      - MONGO_PASS=unifi_password
      - MONGO_PORT=27017
      - MONGO_DBNAME=unifi
      - MONGO_AUTHSOURCE=admin
    volumes:
      - ${APP_DATA_DIR}/config:/config
    restart: unless-stopped
    depends_on:
      - unifi-db

  unifi-db:
    image: mongo:4.4
    environment:
      - MONGO_INITDB_ROOT_USERNAME=unifi
      - MONGO_INITDB_ROOT_PASSWORD=unifi_password
    volumes:
      - ${APP_DATA_DIR}/db:/data/db
    restart: unless-stopped
